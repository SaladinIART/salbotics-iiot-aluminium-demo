apiVersion: v2
name: nexus
description: >
  NEXUS IIoT Platform — Modbus → MQTT → TimescaleDB → FastAPI → Svelte.
  Includes 3-layer alerting (threshold / statistical / ML) and Grafana dashboards.
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - iiot
  - mqtt
  - timescaledb
  - alerting
  - manufacturing

maintainers:
  - name: Salbotics Solutions
    url: https://github.com/SaladinIART

dependencies:
  - name: timescaledb-single
    repository: https://charts.timescale.com
    version: "0.33.x"
    condition: timescaledb.enabled
  - name: grafana
    repository: https://grafana.github.io/helm-charts
    version: "8.x.x"
    condition: grafana.enabled
