{{- if .Values.modbusSim.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-modbus-sim
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: modbus-sim
spec:
  replicas: {{ .Values.modbusSim.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.selectorLabels" (dict "root" . "component" "modbus-sim") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" (dict "root" . "component" "modbus-sim") | nindent 8 }}
    spec:
      containers:
        - name: modbus-sim
          image: {{ include "nexus.image" (dict "root" . "repo" .Values.modbusSim.image.repository) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 1502
              name: modbus
          readinessProbe:
            tcpSocket:
              port: 1502
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.modbusSim.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-modbus-sim
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: modbus-sim
spec:
  type: {{ .Values.modbusSim.service.type }}
  selector:
    {{- include "nexus.selectorLabels" (dict "root" . "component" "modbus-sim") | nindent 4 }}
  ports:
    - name: modbus
      port: {{ .Values.modbusSim.service.port }}
      targetPort: modbus
{{- end }}
