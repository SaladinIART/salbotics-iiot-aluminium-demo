apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-alerting
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
spec:
  replicas: {{ .Values.alerting.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.selectorLabels" (dict "root" . "component" "alerting") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" (dict "root" . "component" "alerting") | nindent 8 }}
    spec:
      containers:
        - name: alerting
          image: {{ include "nexus.image" (dict "root" . "repo" .Values.alerting.image.repository) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            {{- include "nexus.commonEnv" . | nindent 12 }}
            - name: ALERT_DEDUP_WINDOW_SEC
              value: {{ .Values.alerting.env.ALERT_DEDUP_WINDOW_SEC | quote }}
            - name: ALERT_WEBHOOK_URL
              value: {{ .Values.alerting.env.ALERT_WEBHOOK_URL | quote }}
            - name: ML_MIN_SAMPLES
              value: {{ .Values.alerting.env.ML_MIN_SAMPLES | quote }}
            - name: ML_REFIT_EVERY
              value: {{ .Values.alerting.env.ML_REFIT_EVERY | quote }}
            - name: ML_ANOMALY_THRESHOLD
              value: {{ .Values.alerting.env.ML_ANOMALY_THRESHOLD | quote }}
            - name: STAT_ZSCORE_THRESHOLD
              value: {{ .Values.alerting.env.STAT_ZSCORE_THRESHOLD | quote }}
            - name: STAT_WINDOW_SIZE
              value: {{ .Values.alerting.env.STAT_WINDOW_SIZE | quote }}
          resources:
            {{- toYaml .Values.alerting.resources | nindent 12 }}
