{{- if .Values.emqx.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-emqx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: emqx
spec:
  replicas: {{ .Values.emqx.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.selectorLabels" (dict "root" . "component" "emqx") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" (dict "root" . "component" "emqx") | nindent 8 }}
    spec:
      containers:
        - name: emqx
          image: {{ .Values.emqx.image.repository }}:{{ .Values.emqx.image.tag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 8083
              name: ws
            - containerPort: 18083
              name: dashboard
          env:
            - name: EMQX_NODE_NAME
              value: emqx@localhost
            - name: EMQX_CLUSTER__DISCOVERY_STRATEGY
              value: manual
          readinessProbe:
            exec:
              command: ["emqx", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["emqx", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.emqx.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-emqx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: emqx
spec:
  type: {{ .Values.emqx.service.type }}
  selector:
    {{- include "nexus.selectorLabels" (dict "root" . "component" "emqx") | nindent 4 }}
  ports:
    - name: mqtt
      port: {{ .Values.emqx.service.mqttPort }}
      targetPort: mqtt
    - name: ws
      port: {{ .Values.emqx.service.wsPort }}
      targetPort: ws
    - name: dashboard
      port: {{ .Values.emqx.service.dashboardPort }}
      targetPort: dashboard
{{- end }}
