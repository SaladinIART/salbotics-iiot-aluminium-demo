# ─────────────────────────────────────────────────────────────────────────────
# NEXUS IIoT Platform — Helm Values
# Override any value with:  helm install nexus ./helm/nexus --set key=value
#                       or:  helm install nexus ./helm/nexus -f my-values.yaml
# ─────────────────────────────────────────────────────────────────────────────

# Container image registry prefix for all NEXUS services
# Override to use your own GHCR namespace after running the release workflow
imageRegistry: ghcr.io/saladinart
imageTag: "1.0.0"
imagePullPolicy: IfNotPresent

# ── Shared credentials (override in production) ───────────────────────────────
secrets:
  postgresPassword: iiot_password_change_me
  mqttPassword: demo_password
  apiKey: nexus-dev-key-change-me
  grafanaAdminPassword: change_me_now

# ── MQTT broker (EMQX) ───────────────────────────────────────────────────────
emqx:
  enabled: true
  replicaCount: 1
  image:
    repository: emqx/emqx
    tag: "5.8"
  service:
    type: ClusterIP
    mqttPort: 1883
    wsPort: 8083
    dashboardPort: 18083
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── TimescaleDB (via subchart) ────────────────────────────────────────────────
timescaledb:
  enabled: true
  # Values passed through to the timescaledb-single subchart
  replicaCount: 1
  persistentVolumes:
    data:
      size: 20Gi
  credentials:
    superuser:
      password: iiot_password_change_me

# ── Modbus simulator ─────────────────────────────────────────────────────────
modbusSim:
  enabled: true
  replicaCount: 1
  image:
    repository: nexus-iiot-modbus-sim
  service:
    type: ClusterIP
    port: 1502
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Collector ────────────────────────────────────────────────────────────────
collector:
  replicaCount: 1
  image:
    repository: nexus-iiot-collector
  env:
    SITE: demo-site
    LINE: line-1
    COLLECT_INTERVAL_MS: "1000"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Ingestor ─────────────────────────────────────────────────────────────────
ingestor:
  replicaCount: 1
  image:
    repository: nexus-iiot-ingestor
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ── Alerting ─────────────────────────────────────────────────────────────────
alerting:
  replicaCount: 1
  image:
    repository: nexus-iiot-alerting
  env:
    ALERT_DEDUP_WINDOW_SEC: "300"
    ALERT_WEBHOOK_URL: ""
    ML_MIN_SAMPLES: "50"
    ML_REFIT_EVERY: "500"
    ML_ANOMALY_THRESHOLD: "-0.1"
    STAT_ZSCORE_THRESHOLD: "3.0"
    STAT_WINDOW_SIZE: "100"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── API ───────────────────────────────────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: nexus-iiot-api
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Grafana (via subchart) ────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: change_me_now
  service:
    type: ClusterIP
    port: 3000

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  # host: nexus.yourdomain.com
  host: ""
  tls:
    enabled: false
    secretName: nexus-tls
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod

# ── Namespace ────────────────────────────────────────────────────────────────
namespace: nexus
