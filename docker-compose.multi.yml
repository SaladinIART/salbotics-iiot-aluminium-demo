# Tier 2 — Multi-Site overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.multi.yml up --build
#
# What this adds:
#   - A second Modbus simulator on port 1503 (site-b factory floor)
#   - A second collector targeting site-b, publishing to MQTT with SITE=site-b
#   - EMQX broker stub (cluster-ready) replacing Mosquitto for multi-site scale
#   - Seeds site-b row into TimescaleDB on first start
#
# Scale rule: adding a third site = copy the site_b block, change env vars.
# No code changes required — the topic schema and DB schema are multi-site from day one.

services:
  # ── EMQX replaces Mosquitto at Tier 2 ────────────────────────────────────────
  # Comment out mosquitto in docker-compose.yml when using this overlay.
  emqx:
    image: emqx/emqx:5.8
    container_name: iiot-emqx
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WS
      - "18083:18083"  # Dashboard (admin/public)
    environment:
      EMQX_NODE_NAME: emqx@localhost
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Site B: second Modbus simulator ──────────────────────────────────────────
  modbus_sim_b:
    build:
      context: .
      dockerfile: sim/modbus_sim/Dockerfile
    container_name: iiot-modbus-sim-b
    ports:
      - "1503:1502"
    environment:
      SITE: site-b
      LINE: assembly-line-1

  # ── Site B: dedicated collector ───────────────────────────────────────────────
  collector_site_b:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    container_name: iiot-collector-site-b
    env_file:
      - .env.example
    environment:
      MQTT_HOST: emqx
      MODBUS_HOST: modbus_sim_b
      MODBUS_PORT: "1502"
      SITE: site-b
      LINE: assembly-line-1
      MQTT_CLIENT_ID_PREFIX: iiot-site-b
    depends_on:
      emqx:
        condition: service_healthy
      modbus_sim_b:
        condition: service_started

  # ── Site B: dedicated ingestor ────────────────────────────────────────────────
  ingestor_site_b:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    container_name: iiot-ingestor-site-b
    env_file:
      - .env.example
    environment:
      MQTT_HOST: emqx
      PGHOST: timescaledb
      MQTT_CLIENT_ID_PREFIX: iiot-ingestor-site-b
    depends_on:
      emqx:
        condition: service_healthy
      timescaledb:
        condition: service_started

  # ── Seed site-b into TimescaleDB ─────────────────────────────────────────────
  seed_site_b:
    image: timescale/timescaledb:latest-pg16
    container_name: iiot-seed-site-b
    depends_on:
      - timescaledb
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-iiot_password_change_me}
    entrypoint: >
      sh -c "
        until pg_isready -h timescaledb -U ${POSTGRES_USER:-iiot}; do sleep 1; done;
        psql -h timescaledb -U ${POSTGRES_USER:-iiot} -d ${POSTGRES_DB:-iiot} -c \"
          INSERT INTO sites (site_id, display_name, location, timezone)
          VALUES ('site-b', 'Site B (Penang)', 'Penang, Malaysia', 'Asia/Kuala_Lumpur')
          ON CONFLICT (site_id) DO NOTHING;
        \"
      "
    restart: "no"
